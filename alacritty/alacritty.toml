[general]
import = ["~/.config/alacritty/theme/rose-pine.toml"]

[env]
TERM = "xterm-256color"

[font]
size = 9.0

[font.bold]
family = "Hack Nerd Font Mono"
style = "Bold"

[font.bold_italic]
family = "Hack Nerd Font Mono"
style = "Bold Italic"

[font.italic]
family = "Hack Nerd Font Mono"
style = "Italic"

[font.normal]
family = "Hack Nerd Font Mono"
style = "Regular"

[window]
decorations = "Full" #Options: Full | None
opacity =  1.0 #Float 0.0 - 1.0
