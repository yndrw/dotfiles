# Colors section of "Alacritty - TOML configuration file format"
# https://github.com/alacritty/alacritty/blob/master/extra/man/alacritty.5.scd#colors

[colors.primary]
foreground = "#e0def4"
background = "#120f1c"
dim_foreground = "#908caa"
bright_foreground = "#e0def4"

[colors.cursor]
text = "#e0def4"
cursor = "#524f67"

[colors.vi_mode_cursor]
text = "#e0def4"
cursor = "#524f67"

[colors.search.matches]
foreground = "#908caa"
background = "#26233a"

[colors.search.focused_match]
foreground = "#191724"
background = "#ebbcba"

[colors.hints.start]
foreground = "#908caa"
background = "#1f1d2e"

[colors.hints.end]
foreground = "#6e6a86"
background = "#1f1d2e"

[colors.line_indicator]
foreground = "None"
background = "None"

[colors.footer_bar]
foreground = "#e0def4"
background = "#1f1d2e"

[colors.selection]
text = "#e0def4"
background = "#403d52"

[colors.normal]
black = "#26233a"
red = "#eb6f92"
green = "#31748f"
yellow = "#f6c177"
blue = "#9ccfd8"
magenta = "#c4a7e7"
cyan = "#ebbcba"
white = "#e0def4"

[colors.bright]
black   = "#908caa"
red     = "#f08aa6"
green   = "#3e8fb0"
yellow  = "#ffd6a5"
blue    = "#b8e0e8"
magenta = "#d8b9f0"
cyan    = "#f3d2cf"
white   = "#f5f3ff"

[colors.dim]
black   = "#1f1d2e"
red     = "#c85a7a"
green   = "#255a6b"
yellow  = "#c9a05c"
blue    = "#7aaeb7"
magenta = "#a68acb"
cyan    = "#cfa8a6"
white   = "#b9b7d0"
